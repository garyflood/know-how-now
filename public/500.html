<!DOCTYPE html>
<html lang="en">
<head>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&family=Work+Sans:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: "Work Sans", "Helvetica", sans-serif; background: #fff; color: #212529; min-height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding-bottom: 80px; }
    .logo { width: 80px; height: auto; }
.error-code { font-family: "Nunito", "Helvetica", sans-serif; font-size: 5.5rem; font-weight: 700; line-height: 1; color: #FD1015; }
    .error-title { font-family: "Nunito", "Helvetica", sans-serif; font-weight: 700; font-size: 1.4rem; }
    .btn-home { background-color: #4ECDC4; border-color: #4ECDC4; color: #fff; font-weight: 700; letter-spacing: 0.5px; }
    .btn-home:hover { background-color: #3ab8b0; border-color: #3ab8b0; color: #fff; }
    .bottom-navbar { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #e9ecef; z-index: 1050; padding-bottom: env(safe-area-inset-bottom); }
    .bottom-navbar-inner { display: flex; justify-content: space-around; align-items: center; max-width: 600px; margin: 0 auto; padding: 8px 0; }
    .bottom-navbar-tab { display: flex; flex-direction: column; align-items: center; text-decoration: none; color: #b0b0b0; font-size: 10px; font-weight: 600; letter-spacing: 0.5px; padding: 4px 16px; }
    .bottom-navbar-tab i { font-size: 22px; margin-bottom: 4px; }
    .bottom-navbar-tab:hover { color: #4ECDC4; text-decoration: none; }
  </style>
</head>
<body>
  <main class="container text-center px-4" style="max-width: 480px;">
    <img src="/logo_transparent.png" alt="Know How Now" class="logo mb-4">

    <h1 class="error-title mb-3">Something Went Wrong</h1>
    <p class="text-muted mb-4">We're sorry — something went wrong on our end. Please try again in a moment.</p>
    <a href="/" class="btn btn-home btn-lg px-5">
      <i class="fa-solid fa-house me-2"></i>Go Home
    </a>
  </main>

  <nav class="bottom-navbar">
    <div class="bottom-navbar-inner">
      <a href="/" class="bottom-navbar-tab"><i class="fa-solid fa-camera"></i><span>SCANNER</span></a>
      <a href="/explore" class="bottom-navbar-tab"><i class="fa-solid fa-compass"></i><span>EXPLORE</span></a>
      <a href="/profile" class="bottom-navbar-tab"><i class="fa-solid fa-user"></i><span>PROFILE</span></a>
    </div>
  </nav>

</html>
